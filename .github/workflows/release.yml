name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'           # triggers on tags like v1.0.0, v1.2.3

jobs:
  release:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Check out your source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build and publish to GitHub Releases
      - name: Build & Release
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
