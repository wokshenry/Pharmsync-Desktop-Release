name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.2.2
        with:
          repository: wokshenry/Pharmacy
          token: ${{ secrets.CHECKOUT_TOKEN }}
          path: ./app

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24

      # ── Step 1: Build the React frontend first ──
      - name: Install React app dependencies
        working-directory: ./app/pharmacy-app
        run: npm install

      - name: Build React app
        working-directory: ./app/pharmacy-app
        run: npm run build

      # ── Step 2: Build the Electron installer ──
      - name: Install Electron dependencies
        working-directory: ./app/DESKTOP
        run: npm install

      - name: Build Windows
        working-directory: ./app/DESKTOP
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.2.2
        with:
          repository: wokshenry/Pharmacy
          token: ${{ secrets.CHECKOUT_TOKEN }}
          path: ./app

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24

      - name: Install Linux build tools
        run: sudo apt-get install -y build-essential python3

      # ── Step 1: Build the React frontend first ──
      - name: Install React app dependencies
        working-directory: ./app/pharmacy-app
        run: npm install

      - name: Build React app
        working-directory: ./app/pharmacy-app
        run: npm run build

      # ── Step 2: Build the Electron installer ──
      - name: Install Electron dependencies
        working-directory: ./app/DESKTOP
        run: npm install

      - name: Build Linux
        working-directory: ./app/DESKTOP
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.2.2
        with:
          repository: wokshenry/Pharmacy
          token: ${{ secrets.CHECKOUT_TOKEN }}
          path: ./app

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24

      # ── Step 1: Build the React frontend first ──
      - name: Install React app dependencies
        working-directory: ./app/pharmacy-app
        run: npm install

      - name: Build React app
        working-directory: ./app/pharmacy-app
        run: npm run build

      # ── Step 2: Build the Electron installer ──
      - name: Install Electron dependencies
        working-directory: ./app/DESKTOP
        run: npm install

      - name: Build macOS
        working-directory: ./app/DESKTOP
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
